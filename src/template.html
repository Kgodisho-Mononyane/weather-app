<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template repository</title>
  </head>
  <body>
    <header>
      <h1 id="heading">Weather App</h1>
      <div id="left-header">
        <input type="text" placeholder="City" id="city-input">
        <button type="submit" id="submit-btn">Submit</button>
      </div>
      
    </header>
    <main>
      <div id="content-container">
        <h1 id="city-name">Johannesburg</h1>
        <h2 id="temperature-value">16 c</h2>
        <h3 id="weather-value">Overcast</h3>
        <div>
          <h3>min: 14 c</h3>
          <h3>max: 26 c</h3>
        </div>
      </div>
    </main>
    
  </body>
</html>
