<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template repository</title>
  </head>
  <body>
    <header>
      <h1 id="heading">Weather App</h1>
      <form id="address-form">
        <input type="text" placeholder="City" id="city-input" />
        <button type="submit" id="submit-btn">Submit</button>
      </form>
    </header>
    <main>
      <div id="content-container">
        <h1 id="city-name">Johannesburg</h1>
        <h2 id="temperature-value">16 c</h2>
        <h3 id="weather-value">Overcast</h3>
        <h3 id="weather-description">Description here</h3>
        <div id="info-container">
          <div class="info">
            <p id="wind-speed">Wind speed:</p>
          </div>
          <div class="info">
            <p id="feels-like">Feels like:</p>
          </div>
          <div class="info">
            <p id="cloud-cover">Cloud cover:</p>
          </div>
          <div class="info">
            <p id="humidity">Humidity:</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
