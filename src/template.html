<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
  </head>
  <body>
    <header>
      <form id="address-form">
        <input
          type="text"
          placeholder="City"
          id="address-input"
          autocomplete="off"
        />
        <button type="submit" id="submit-btn">Submit</button>
      </form>
    </header>
    <main>
      <div id="content-container">
        <h1 id="city-name">ENTER A LOCATION</h1>
        <h2 id="temperature-value">°C</h2>
        <h3 id="weather-value">Weather conditions</h3>
        <h3 id="weather-description">Weather description</h3>
        <div id="info-container">
          <div class="info">
            <p id="wind-speed">WIND SPEED:</p>
          </div>
          <div class="info">
            <p id="feels-like">FEELS LIKE:</p>
          </div>
          <div class="info">
            <p id="cloud-cover">CLOUD COVER:</p>
          </div>
          <div class="info">
            <p id="humidity">HUMIDITY:</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
